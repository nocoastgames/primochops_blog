<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fab Tabs Shop Notes — Admin</title>
<meta name="robots" content="noindex, nofollow">
<style>
  :root {
    --rust: #a6491f; --ink: #16130f; --paper: #fdfaf1; --line: #e2dbc9; --bg: #f4f1ea;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--ink);
    font-family: -apple-system, "Public Sans", sans-serif; line-height: 1.5;
  }
  .wrap { max-width: 1180px; margin: 0 auto; padding: 32px 20px 80px; }
  h1 { font-size: 1.5rem; margin: 0 0 4px; }
  .sub { color: #666; font-size: 14px; margin: 0 0 28px; }
  .card { background: var(--paper); border: 1px solid var(--line); border-radius: 8px; padding: 24px; margin-bottom: 20px; }
  label { display: block; font-size: 13px; font-weight: 600; margin: 14px 0 4px; }
  label:first-child { margin-top: 0; }
  input[type=text], input[type=password], textarea, select {
    width: 100%; padding: 9px 10px; border: 1px solid #ccc; border-radius: 5px;
    font-family: inherit; font-size: 14px; background: #fff; color: var(--ink);
  }
  textarea { min-height: 240px; font-family: "SFMono-Regular", Consolas, monospace; font-size: 13px; }
  .editor-toolbar {
    display: flex; align-items: center; gap: 4px; flex-wrap: wrap;
    background: #efe9d8; border: 1px solid #ccc; border-bottom: none;
    border-radius: 5px 5px 0 0; padding: 6px;
  }
  .editor-toolbar button {
    margin: 0; padding: 6px 10px; font-size: 13px; font-weight: 500;
    background: #fff; color: var(--ink); border: 1px solid #ccc;
  }
  .editor-toolbar button:hover { background: #f0e6d0; }
  .editor-toolbar .spacer { flex: 1; }
  .editor-toolbar #html-toggle-btn { background: var(--ink); color: #fff; border-color: var(--ink); }
  .editor-visual {
    min-height: 260px; max-height: 480px; overflow-y: auto;
    border: 1px solid #ccc; border-top: none; border-radius: 0 0 5px 5px;
    padding: 14px 16px; background: #fff; font-size: 15px; line-height: 1.6;
  }
  .editor-visual:focus { outline: 2px solid var(--rust); outline-offset: -1px; }
  .editor-visual h2 { font-size: 1.15rem; margin: 18px 0 8px; }
  .editor-visual p { margin: 0 0 12px; }
  .editor-visual ul { margin: 0 0 12px; padding-left: 22px; }
  .editor-visual a { color: var(--rust); }
  .editor-visual .shop-note { background: #f4ecd8; border-radius: 4px; padding: 12px 14px; margin: 12px 0; }
  .editor-visual .shop-note .label { display: block; font-weight: 700; font-size: 12px; color: var(--rust); margin-bottom: 4px; }
  .row { display: flex; gap: 16px; }
  .row > div { flex: 1; }
  button {
    background: var(--rust); color: #fff; border: none; border-radius: 5px;
    padding: 9px 18px; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 16px;
  }
  button:hover { opacity: 0.9; }
  button.secondary { background: #999; }
  button.danger { background: #7a2a1a; }
  .msg { font-size: 13px; margin-top: 10px; }
  .msg.error { color: #a6231f; }
  .msg.ok { color: #2a6b3a; }
  .post-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 0; border-bottom: 1px solid var(--line);
  }
  .post-row:last-child { border-bottom: none; }
  .post-row .title { font-weight: 600; }
  .post-row .meta { font-size: 12px; color: #777; }
  .badge { font-size: 11px; padding: 2px 7px; border-radius: 3px; background: #eee; margin-left: 8px; }
  .badge.draft { background: #f3e0c9; color: #7a4a10; }
  .actions button { margin: 0 0 0 8px; padding: 6px 12px; font-size: 13px; }
  .toolbar { display: flex; gap: 10px; margin-bottom: 16px; }
  .toolbar input { flex: 1; }
  #editor { display: none; }
  a.linklike { color: var(--rust); cursor: pointer; text-decoration: underline; font-size: 14px; }
  .top-actions { display: flex; justify-content: space-between; align-items: center; }
  .top-actions .buttons { display: flex; gap: 8px; }
  .admin-shell { display: flex; align-items: flex-start; gap: 20px; }
  .sidebar {
    width: 280px; flex-shrink: 0; background: var(--paper); border: 1px solid var(--line);
    border-radius: 8px; padding: 16px; overflow: hidden;
    transition: width 0.15s ease, padding 0.15s ease, opacity 0.15s ease, margin 0.15s ease;
  }
  .sidebar.collapsed { width: 0; padding: 0; border: none; opacity: 0; margin-right: -20px; pointer-events: none; }
  .sidebar #search { margin-bottom: 8px; }
  .sidebar > button { width: 100%; margin-top: 0; margin-bottom: 14px; }
  .main-content { flex: 1; min-width: 0; }
  .post-tree { font-size: 14px; }
  .post-tree details { margin-bottom: 2px; }
  .post-tree summary {
    cursor: pointer; padding: 6px 4px; border-radius: 4px; user-select: none;
  }
  .post-tree summary:hover { background: rgba(166,73,31,0.08); }
  .tree-year > summary { font-weight: 700; }
  .tree-month > summary { font-size: 13px; color: #6b6350; margin-left: 8px; }
  .tree-posts { margin-left: 24px; }
  .tree-post {
    display: flex; align-items: center; justify-content: space-between; gap: 6px;
    padding: 6px 8px; border-radius: 4px; cursor: pointer; font-size: 13px;
  }
  .tree-post:hover { background: rgba(166,73,31,0.08); }
  .tree-post.active { background: var(--rust); color: #fff; }
  .tree-post.active .badge.draft { background: #fff; color: var(--rust); }
  .tree-post-title { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
</style>
</head>
<body>
<div class="wrap">

  <div id="login-view" class="card" style="max-width:360px;">
    <h1>Shop Notes Admin</h1>
    <p class="sub">Log in to write and manage posts.</p>
    <label>Password</label>
    <input type="password" id="password" onkeydown="if(event.key==='Enter') login()">
    <button onclick="login()">Log in</button>
    <p class="msg error" id="login-msg"></p>
  </div>

  <div id="admin-view" style="display:none;">
    <div class="top-actions">
      <div>
        <h1>Shop Notes Admin</h1>
        <p class="sub">Write, edit, and publish posts for blog.primochops.com</p>
      </div>
      <div class="buttons">
        <button class="secondary" onclick="toggleSidebar()">☰ Posts</button>
        <button class="secondary" onclick="logout()">Log out</button>
      </div>
    </div>

    <div class="admin-shell">
      <aside class="sidebar" id="sidebar">
        <input type="text" id="search" placeholder="Search posts…" oninput="loadPosts()">
        <button onclick="newPost()">+ New post</button>
        <div id="post-tree" class="post-tree"></div>
      </aside>

      <div class="main-content">
        <div id="empty-state" class="card">
          <p class="sub" style="margin:0;">Select a post from the list on the left, or create a new one.</p>
        </div>

        <div id="editor" class="card" style="display:none;">
          <h2 id="editor-heading">New post</h2>
          <label>Title</label>
          <input type="text" id="f-title" oninput="autoSlug()">
          <div class="row">
            <div>
              <label>Slug (URL)</label>
              <input type="text" id="f-slug">
            </div>
            <div>
              <label>Category</label>
              <input type="text" id="f-category" placeholder="Exhaust, Fabrication, Brakes…">
            </div>
          </div>
          <label>Excerpt (shown in the post list &amp; search snippets)</label>
          <textarea id="f-excerpt" style="min-height:70px;"></textarea>
          <label>Body</label>
          <div class="editor-toolbar">
            <button type="button" onmousedown="event.preventDefault()" onclick="fmt('formatBlock','P')" title="Paragraph">¶</button>
            <button type="button" onmousedown="event.preventDefault()" onclick="fmt('formatBlock','H2')" title="Heading"><b>H2</b></button>
            <button type="button" onmousedown="event.preventDefault()" onclick="fmt('bold')" title="Bold"><b>B</b></button>
            <button type="button" onmousedown="event.preventDefault()" onclick="fmt('insertUnorderedList')" title="Bullet list">&bull; List</button>
            <button type="button" onmousedown="event.preventDefault()" onclick="insertLink()" title="Link">Link</button>
            <button type="button" onmousedown="event.preventDefault()" onclick="insertShopNote()" title="Insert shop-note callout box">+ Shop Note</button>
            <span class="spacer"></span>
            <button type="button" onclick="toggleHtmlView()" id="html-toggle-btn" title="Switch to raw HTML">HTML</button>
          </div>
          <div id="f-body-visual" class="editor-visual" contenteditable="true"></div>
          <textarea id="f-body" style="display:none;"></textarea>
          <p class="sub" style="margin-top:6px;">Use the toolbar for normal writing. Switch to HTML if you need something the toolbar doesn't cover.</p>
          <label><input type="checkbox" id="f-published" checked style="width:auto;display:inline;vertical-align:middle;"> Published (uncheck to save as a draft)</label>
          <div>
            <button onclick="savePost()">Save post</button>
            <button class="secondary" onclick="closeEditor()">Cancel</button>
            <button class="danger" id="delete-btn" style="display:none;" onclick="deletePost()">Delete</button>
          </div>
          <p class="msg" id="editor-msg"></p>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
let editingSlug = null;
let htmlViewActive = false;

function fmt(command, value) {
  document.getElementById('f-body-visual').focus();
  document.execCommand(command, false, value || null);
}

function insertLink() {
  const url = prompt('Link URL (include https://):');
  if (!url) return;
  document.getElementById('f-body-visual').focus();
  document.execCommand('createLink', false, url);
}

function insertShopNote() {
  document.getElementById('f-body-visual').focus();
  const html = '<div class="shop-note"><span class="label">From the bench</span>Type your note here.</div><p><br></p>';
  document.execCommand('insertHTML', false, html);
}

function toggleHtmlView() {
  const visual = document.getElementById('f-body-visual');
  const textarea = document.getElementById('f-body');
  const btn = document.getElementById('html-toggle-btn');
  if (!htmlViewActive) {
    textarea.value = visual.innerHTML.trim();
    visual.style.display = 'none';
    document.querySelector('.editor-toolbar').style.display = 'none';
    textarea.style.display = 'block';
    btn.textContent = 'Visual';
    htmlViewActive = true;
  } else {
    visual.innerHTML = textarea.value;
    textarea.style.display = 'none';
    document.querySelector('.editor-toolbar').style.display = 'flex';
    visual.style.display = 'block';
    btn.textContent = 'HTML';
    htmlViewActive = false;
  }
}

function resetEditorView() {
  htmlViewActive = false;
  document.getElementById('f-body-visual').style.display = 'block';
  document.getElementById('f-body').style.display = 'none';
  document.querySelector('.editor-toolbar').style.display = 'flex';
  document.getElementById('html-toggle-btn').textContent = 'HTML';
}

function getBodyHtml() {
  if (htmlViewActive) return document.getElementById('f-body').value;
  return document.getElementById('f-body-visual').innerHTML.trim();
}

function setBodyHtml(html) {
  document.getElementById('f-body-visual').innerHTML = html || '';
  document.getElementById('f-body').value = html || '';
}

async function api(path, opts = {}) {
  const res = await fetch(path, {
    ...opts,
    headers: { 'Content-Type': 'application/json', ...(opts.headers || {}) },
  });
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.error || ('Request failed: ' + res.status));
  return data;
}

async function checkSession() {
  const { loggedIn } = await api('/api/me');
  document.getElementById('login-view').style.display = loggedIn ? 'none' : 'block';
  document.getElementById('admin-view').style.display = loggedIn ? 'block' : 'none';
  if (loggedIn) loadPosts();
}

async function login() {
  const password = document.getElementById('password').value;
  const msg = document.getElementById('login-msg');
  msg.textContent = '';
  try {
    await api('/api/login', { method: 'POST', body: JSON.stringify({ password }) });
    checkSession();
  } catch (e) {
    msg.textContent = e.message;
  }
}

async function logout() {
  await api('/api/logout', { method: 'POST' });
  checkSession();
}

async function loadPosts() {
  const q = document.getElementById('search').value.trim();
  const url = '/api/posts?all=1' + (q ? '&q=' + encodeURIComponent(q) : '');
  const { posts } = await api(url);
  renderTree(posts);
}

function renderTree(posts) {
  const tree = document.getElementById('post-tree');

  if (!posts.length) {
    tree.innerHTML = '<p class="sub" style="margin-top:12px;">No posts found.</p>';
    return;
  }

  const groups = {};
  posts.forEach(p => {
    const d = new Date(p.created_at.replace(' ', 'T') + 'Z');
    const year = d.getFullYear();
    const month = d.getMonth();
    if (!groups[year]) groups[year] = {};
    if (!groups[year][month]) groups[year][month] = [];
    groups[year][month].push(p);
  });

  const years = Object.keys(groups).sort((a, b) => b - a);
  let html = '';

  years.forEach((year, yi) => {
    const months = Object.keys(groups[year]).sort((a, b) => b - a);
    html += '<details class="tree-year"' + (yi === 0 ? ' open' : '') + '><summary>' + year + '</summary>';

    months.forEach((month, mi) => {
      const monthName = new Date(2000, Number(month), 1).toLocaleString('en-US', { month: 'long' });
      html += '<details class="tree-month"' + (yi === 0 && mi === 0 ? ' open' : '') + '><summary>' + monthName + '</summary><div class="tree-posts">';

      groups[year][month].forEach(p => {
        html += '<div class="tree-post" data-slug="' + escapeHtml(p.slug) + '" onclick="editPost(\'' + p.slug + '\')">'
          + '<span class="tree-post-title">' + escapeHtml(p.title) + '</span>'
          + (!p.published ? '<span class="badge draft">Draft</span>' : '')
          + '</div>';
      });

      html += '</div></details>';
    });

    html += '</details>';
  });

  tree.innerHTML = html;
  highlightActivePost();
}

function highlightActivePost() {
  document.querySelectorAll('.tree-post').forEach(el => {
    el.classList.toggle('active', el.getAttribute('data-slug') === editingSlug);
  });
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('collapsed');
}

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function autoSlug() {
  if (editingSlug) return; // don't auto-change slug once editing an existing post
  const title = document.getElementById('f-title').value;
  document.getElementById('f-slug').value = title
    .toLowerCase().trim()
    .replace(/['"]/g, '')
    .replace(/[^a-z0-9]+/g, '-')
    .replace(/^-+|-+$/g, '');
}

function newPost() {
  editingSlug = null;
  document.getElementById('editor-heading').textContent = 'New post';
  document.getElementById('f-title').value = '';
  document.getElementById('f-slug').value = '';
  document.getElementById('f-category').value = '';
  document.getElementById('f-excerpt').value = '';
  setBodyHtml('<p><br></p>');
  resetEditorView();
  document.getElementById('f-published').checked = true;
  document.getElementById('delete-btn').style.display = 'none';
  document.getElementById('editor-msg').textContent = '';
  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('editor').style.display = 'block';
  highlightActivePost();
}

async function editPost(slug) {
  const { post } = await api('/api/posts/' + encodeURIComponent(slug) + '?all=1');
  editingSlug = slug;
  document.getElementById('editor-heading').textContent = 'Edit post';
  document.getElementById('f-title').value = post.title;
  document.getElementById('f-slug').value = post.slug;
  document.getElementById('f-category').value = post.category;
  document.getElementById('f-excerpt').value = post.excerpt;
  setBodyHtml(post.body_html);
  resetEditorView();
  document.getElementById('f-published').checked = !!post.published;
  document.getElementById('delete-btn').style.display = 'inline-block';
  document.getElementById('editor-msg').textContent = '';
  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('editor').style.display = 'block';
  highlightActivePost();
}

function closeEditor() {
  document.getElementById('editor').style.display = 'none';
  document.getElementById('empty-state').style.display = 'block';
  editingSlug = null;
  highlightActivePost();
}

async function savePost() {
  const payload = {
    title: document.getElementById('f-title').value.trim(),
    slug: document.getElementById('f-slug').value.trim(),
    category: document.getElementById('f-category').value.trim() || 'General',
    excerpt: document.getElementById('f-excerpt').value.trim(),
    body_html: getBodyHtml(),
    published: document.getElementById('f-published').checked,
  };
  const msg = document.getElementById('editor-msg');
  msg.className = 'msg';
  msg.textContent = 'Saving…';
  try {
    if (editingSlug) {
      await api('/api/posts/' + encodeURIComponent(editingSlug), { method: 'PUT', body: JSON.stringify(payload) });
    } else {
      await api('/api/posts', { method: 'POST', body: JSON.stringify(payload) });
    }
    msg.className = 'msg ok';
    msg.textContent = 'Saved.';
    setTimeout(() => { closeEditor(); loadPosts(); }, 500);
  } catch (e) {
    msg.className = 'msg error';
    msg.textContent = e.message;
  }
}

async function deletePost() {
  if (!editingSlug) return;
  if (!confirm('Delete this post? This action cannot be undone.')) return;
  await api('/api/posts/' + encodeURIComponent(editingSlug), { method: 'DELETE' });
  closeEditor();
  loadPosts();
}

checkSession();
</script>
</body>
</html>
